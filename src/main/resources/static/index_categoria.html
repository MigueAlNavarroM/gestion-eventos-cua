<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías - UAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main_categoria.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4" style="background-color: #1a1d20 !important;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">UAM - Gestión de Eventos Culturales</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active fw-bold" href="index_categoria.html">Categorías</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="index_instructor.html">Instructores</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div id="name-or-number" class="container">
    <div class="text-center card p-4 shadow-sm">
        <form action="javascript:void(0);" onsubmit="baseURL()">
            <label class="form-label fw-bold">Indica el ID de la Categoría</label>
            <input id="categoriaInput" type="text" class="form-control text-center mb-3" placeholder="Ej. 1">

            <div class="d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-warning flex-grow-1 fw-bold" onclick="baseURL()">Buscar Categoría</button>
                <button type="button" class="btn btn-outline-primary flex-grow-1 fw-bold" onclick="listarTodasCategorias()">Mostrar todas las categorías</button>
                <button type="button" class="btn btn-outline-success flex-grow-1 fw-bold" onclick="mostrarFormularioCategoria()">Registrar nueva categoría</button>
            </div>
        </form>
        <div id="mensajeExitoCat" class="alert alert-success mt-3 d-none" role="alert"></div>
    </div>
</div>

<div id="table" class="container mt-4 card p-4 shadow" style="display: none;">
    <div class="row">
        <div class="col-12 text-center mb-4">
            <img width="150px" src="assets/img/teminalNotFound.jpg" alt="Categoría" id="image" class="rounded shadow-sm">
        </div>
        <div class="col-6 text-end fw-bold"><p>ID Categoría:</p></div>
        <div class="col-6 text-start"><p id="parameterValue0"></p></div>
        <div class="col-6 text-end fw-bold"><p>Nombre:</p></div>
        <div class="col-6 text-start"><p id="parameterValue1"></p></div>
        <div class="col-6 text-end fw-bold"><p>Descripción:</p></div>
        <div class="col-6 text-start"><p id="parameterValue2"></p></div>
        <div class="col-6 text-end fw-bold"><p>¿Genera Certificado?:</p></div>
        <div class="col-6 text-start"><p id="parameterValue3"></p></div>
    </div>
</div>

<div id="seccionFormularioCat" class="container mt-4 card p-4 shadow d-none">
    <h4 class="mb-3 fw-bold text-success">Registrar Nueva Categoría</h4>
    <form id="formCategoria" class="row g-3">
        <div class="col-md-6">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" id="catNombre" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">¿Genera Certificado?</label>
            <select id="catCertificado" class="form-select">
                <option value="true">Sí</option>
                <option value="false">No</option>
            </select>
        </div>
        <div class="col-12">
            <label class="form-label fw-bold">Descripción</label>
            <textarea id="catDescripcion" class="form-control" rows="3"></textarea>
        </div>
        <div class="col-12 text-end">
            <button type="button" class="btn btn-secondary" onclick="ocultarSeccionesCat()">Cancelar</button>
            <button type="submit" class="btn btn-success fw-bold">Guardar Categoría</button>
        </div>
    </form>
</div>

<div id="seccionTablaCat" class="container mt-4 card p-4 shadow d-none">
    <h4 class="mb-3 fw-bold text-primary">Listado General de Categorías</h4>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Certificado</th>
            </tr>
            </thead>
            <tbody id="tablaBodyCat"></tbody>
        </table>
    </div>
</div>

<script src="js/main_categoria.js"></script>
</body>
</html>
